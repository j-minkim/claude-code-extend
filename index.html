  function b64ToBytes(b64) {
    var bin = atob(b64), u = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
    return u;
  }
  async function decryptHtml(pw) {
    var enc = new TextEncoder();
    var keyMat = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
    var key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: b64ToBytes(ENC.salt), iterations: ENC.iter, hash: "SHA-256" },
      keyMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    var pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64ToBytes(ENC.iv) }, key, b64ToBytes(ENC.ct));
    return new TextDecoder().decode(pt);
  }
  document.getElementById("f").addEventListener("submit", async function (e) {
    e.preventDefault();
    var err = document.getElementById("err");
    var btn = e.target.querySelector("button");
    err.textContent = ""; btn.disabled = true; btn.textContent = "여는 중…";
    try {
      var html = await decryptHtml(document.getElementById("pw").value);
      // render the decrypted full document as a fresh page (scripts re-run)
      var blob = new Blob([html], { type: "text/html" });
      window.location.replace(URL.createObjectURL(blob));
    } catch (_) {
      err.textContent = "비밀번호가 올바르지 않습니다.";
      btn.disabled = false; btn.textContent = "열기";
      document.getElementById("pw").select();
    }
  });
